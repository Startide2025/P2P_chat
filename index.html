<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>p2p chat</title></head>
<body style="margin:0;padding:0;overflow:hidden;background:#2a2a2a;display:flex;justify-content:center;align-items:flex-start">
<input type="file" id="ri" accept=".json" style="display:none">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>

const VERSION=7;

// ================================================================
//  NETWORKING STATE
// ================================================================
let peer=null, isHost=false, hostConn=null, clientConns=[];
let clientConnNames=new Map();
let removedNames=new Set(), permanentBans=new Set(), mutedNames=new Set();
let hostUsername='';

// ================================================================
//  AUTH STATE
// ================================================================
let roomPasswords={}, pendingAuthConns=new Map(), authPending=false;

async function hashPassword(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function loadPasswords(rid){ try{ roomPasswords=JSON.parse(localStorage.getItem('passwd:'+rid)||'{}'); }catch(e){ roomPasswords={}; } }
function savePasswords(rid){ if(!rid)return; try{ localStorage.setItem('passwd:'+rid,JSON.stringify(roomPasswords)); }catch(e){} }

// ================================================================
//  ROLE STATE
// ================================================================
let persistentOps=new Set(), persistentMods=new Set();
let sessionOps=new Set(),    sessionMods=new Set();

function loadRoles(rid){ try{ const r=JSON.parse(localStorage.getItem('roles:'+rid)||'{}'); persistentOps=new Set(r.ops||[]); persistentMods=new Set(r.mods||[]); }catch(e){ persistentOps=new Set(); persistentMods=new Set(); } }
function saveRoles(rid){ if(!rid)return; try{ localStorage.setItem('roles:'+rid,JSON.stringify({ops:[...persistentOps],mods:[...persistentMods]})); }catch(e){} }
function clearRoleSets(){ persistentOps=new Set(); persistentMods=new Set(); sessionOps=new Set(); sessionMods=new Set(); }

function _deriveRole(name){ if(name===hostUsername) return 'owner'; if(persistentOps.has(name)) return 'op'; if(sessionOps.has(name)) return 'tempop'; if(persistentMods.has(name)) return 'mod'; if(sessionMods.has(name)) return 'tempmod'; return null; }
function userRole(name){ if(name===hostUsername) return 'owner'; if(isHost) return _deriveRole(name); return users[name]?.role||null; }
function userRank(name){ const r=userRole(name); if(r==='owner') return 4; if(r==='op'||r==='tempop') return 3; if(r==='mod'||r==='tempmod') return 2; return 1; }
function myRank(){ return userRank(username); }
function getRoleBadge(name){ const r=userRole(name); return ({owner:{l:'[H]',c:[55,195,210]},op:{l:'[O]',c:[210,175,55]},tempop:{l:'[TO]',c:[170,140,45]},mod:{l:'[M]',c:[100,150,210]},tempmod:{l:'[TM]',c:[75,115,170]}})[r]||null; }

// ================================================================
//  ROLE GRANT / REVOKE
// ================================================================
function _silentClearRole(name){ persistentOps.delete(name); sessionOps.delete(name); persistentMods.delete(name); sessionMods.delete(name); }
function doGrantRole(name,role){
  _silentClearRole(name);
  if(role==='op') persistentOps.add(name); else if(role==='tempop') sessionOps.add(name); else if(role==='mod') persistentMods.add(name); else if(role==='tempmod') sessionMods.add(name);
  if(role==='op'||role==='mod') saveRoles(roomIdStr);
  if(users[name]) users[name].role=role;
  const lbl={op:'operator',tempop:'temp operator',mod:'moderator',tempmod:'temp moderator'}[role]||role;
  const msg=name+' is now a '+lbl;
  pushMsg({name:'server',message:msg}); broadcastToClients({type:'role_update',name,role},null); broadcastToClients({type:'message',name:'server',message:msg},null);
}
function doRevokeRole(name){
  _silentClearRole(name); saveRoles(roomIdStr);
  if(users[name]) users[name].role=null;
  const msg=name+"'s role was revoked";
  pushMsg({name:'server',message:msg}); broadcastToClients({type:'role_update',name,role:null},null); broadcastToClients({type:'message',name:'server',message:msg},null);
}

// ================================================================
//  PERM PROXY
// ================================================================
function sendOrExecModAction(action,target,roleArg){
  if(isHost){
    if(action==='kick')        doKick(target);
    else if(action==='remove') doRemove(target);
    else if(action==='ban')    doBan(target);
    else if(action==='pardon') doPardon(target);
    else if(action==='mute')   doMute(target);
    else if(action==='unmute') doUnmute(target);
    else if(action==='grant')  doGrantRole(target,roleArg);
    else if(action==='revoke') doRevokeRole(target);
  } else if(hostConn&&hostConn.open){
    hostConn.send({type:'mod_action',action,target,actor:username,roleArg:roleArg||null});
  }
}

// ================================================================
//  BANS / UTILS
// ================================================================
function isBlocked(n){ return removedNames.has(n)||permanentBans.has(n); }
function loadPermanentBans(){ try{ const b=JSON.parse(localStorage.getItem('bans')||'[]'); permanentBans=new Set(Array.isArray(b)?b:[]); }catch(e){ permanentBans=new Set(); } }
function savePermanentBans(){ try{ localStorage.setItem('bans',JSON.stringify([...permanentBans])); }catch(e){} }
function colorFromId(id){ let h=5381; for(let i=0;i<id.length;i++) h=((h<<5)+h)^id.charCodeAt(i); return 'hsl('+((Math.abs(h)%288)+36)+', 58%, 64%)'; }
function resolvedColor(id){ const c=fColor.trim(); return c?c:colorFromId(id); }
function broadcastToClients(data,exceptConn){ for(const c of clientConns) if(c!==exceptConn&&c.open) c.send(data); }
function connForName(n){ for(const [c,nm] of clientConnNames) if(nm===n) return c; return null; }
function sanitizeAvatar(av){ if(!Array.isArray(av)||av.length!==64) return null; if(av.some(c=>typeof c!=='string'||c.length>32)) return null; return av; }

// ================================================================
//  LAYOUT  (dynamic — recomputed on resize)
// ================================================================
const MARGX=20, MARGY=20, TBOXY=20;
const HEADER_H=28, FOOTER_H=36;
const MBW=74, MBH=28, CBW=88, CBH=26;
const SFH=28, FB_H=22;
const SB_W=4;
const AV_CS=14, AV_PCW=13, AV_PCH=13;

let fontSize=12;
const FONT_MIN=8, FONT_MAX=24;
function PADY(){ return fontSize+4; }

let MAXX, MAXY, SFW, SB_X;
let SY_TITLE, SY_TAG, SY_UNAME, SY_MBTNS, SY_CONT;

function updateLayout(){
  MAXX=max(420,windowWidth);
  MAXY=max(380,windowHeight-HEADER_H-FOOTER_H);
  SFW=min(440,MAXX-100);
  SB_X=MAXX-6;
  SY_TITLE=max(120,floor(MAXY*0.24));
  SY_TAG=SY_TITLE+24; SY_UNAME=SY_TAG+38; SY_MBTNS=SY_UNAME+SFH+14; SY_CONT=SY_MBTNS+MBH+14;
}
function avGridPos(){ return {gx:MAXX/2-SFW/2, gy:SY_CONT+SFH+16+SFH+10}; }

// ================================================================
//  ONLINE PANEL GEOMETRY
// ================================================================
function getBlockedList(){ if(!isHost) return []; const all=new Set([...removedNames,...permanentBans]); return [...all].map(n=>({name:n,type:permanentBans.has(n)?'ban':'remove'})); }
function onlinePanelGeom(ol,fy){
  const bl=getBlockedList(), hasBlocked=bl.length>0, panelW=isHost?296:175;
  const rowH=20, padX=10, padY=8;
  const blockedOffset=hasBlocked?ol.length*rowH+(ol.length>0?10:0):0;
  const innerH=hasBlocked?blockedOffset+bl.length*rowH:ol.length*rowH;
  const panelH=padY+innerH+padY-4;
  const panelX=MAXX-MARGX-panelW, panelY=fy-panelH-5;
  const blockedBaseY=hasBlocked?panelY+padY+blockedOffset:0;
  return {panelW,rowH,padX,padY,panelH,panelX,panelY,bl,hasBlocked,blockedBaseY};
}

// ================================================================
//  COMPLETE JOIN
// ================================================================
function _completeJoin(fromConn,name,color,avatar,role){
  if(persistentOps.has(name)||persistentMods.has(name)){
    _silentClearRole(name); saveRoles(roomIdStr);
    pushMsg({name:'server',message:'note: '+name+' had a saved role but it was cleared on rejoin — re-grant if trusted'});
  }
  users[name]={color,online:true,avatar,role:_deriveRole(name)};
  invalidateAvatarCache(name);
  clientConnNames.set(fromConn,name);
  const jm=name+' joined';
  pushMsg({name:'server',message:jm});
  fromConn.send({type:'init',version:VERSION,
    history:JSON.parse(JSON.stringify(history.filter(m=>m.type!=='_hr'&&m.type!=='_help'))),
    users:  JSON.parse(JSON.stringify(users)),hostName:username});
  broadcastToClients({type:'user_info',name,color,avatar,role:_deriveRole(name)},fromConn);
  broadcastToClients({type:'message',name:'server',message:jm},fromConn);
  if(!roomPasswords[name]) fromConn.send({type:'suggest_register'});
}

// ================================================================
//  INCOMING MESSAGE HANDLER
// ================================================================
function handleIncoming(data,fromConn){
  if(data.type==='message'){
    if(isHost){ const rn=clientConnNames.get(fromConn); if(!rn) return; if(data.name!==rn) data.name=rn; if(mutedNames.has(rn)) return; }
    pushMsg({name:data.name,message:data.message,color:data.color||null,avatar:data.avatar||null});
    if(isHost) broadcastToClients(data,fromConn);

  } else if(data.type==='user_info'){
    if(isHost&&data.version!==VERSION){ if(fromConn&&fromConn.open){ fromConn.send({type:'kick',banType:'version',theirVersion:data.version,ourVersion:VERSION}); setTimeout(()=>fromConn.close(),200); } return; }
    if(isHost&&isBlocked(data.name)){ if(fromConn&&fromConn.open){ fromConn.send({type:'kick',banType:permanentBans.has(data.name)?'ban':'remove'}); setTimeout(()=>fromConn.close(),200); } return; }
    if(isHost&&(data.name===hostUsername||getOnlineList().some(u=>u.name===data.name))){ if(fromConn&&fromConn.open){ fromConn.send({type:'kick',banType:'nameclash'}); setTimeout(()=>fromConn.close(),200); } return; }
    data.avatar=sanitizeAvatar(data.avatar);
    if(isHost&&roomPasswords[data.name]){ pendingAuthConns.set(fromConn,{name:data.name,color:data.color,avatar:data.avatar,role:data.role||null,attempts:0}); fromConn.send({type:'auth_required'}); return; }
    users[data.name]={color:data.color,online:true,avatar:data.avatar||null,role:isHost?_deriveRole(data.name):(data.role||null)};
    invalidateAvatarCache(data.name);
    if(isHost) _completeJoin(fromConn,data.name,data.color,data.avatar||null,data.role||null);

  } else if(data.type==='auth_attempt'){
    if(!isHost) return;
    const pending=pendingAuthConns.get(fromConn); if(!pending) return;
    pending.attempts++;
    if(data.hash===roomPasswords[pending.name]){ pendingAuthConns.delete(fromConn); fromConn.send({type:'auth_success'}); _completeJoin(fromConn,pending.name,pending.color,pending.avatar,pending.role); }
    else{ const left=3-pending.attempts; if(left<=0){ pendingAuthConns.delete(fromConn); fromConn.send({type:'kick',banType:'authfail'}); setTimeout(()=>fromConn.close(),200); } else fromConn.send({type:'auth_fail',attemptsLeft:left}); }

  } else if(data.type==='auth_success'){     authPending=false; pushMsg({name:'server',message:'authenticated successfully'});
  } else if(data.type==='auth_required'){    authPending=true;  pushMsg({name:'server',message:'this username has a password — /login <password> to continue'});
  } else if(data.type==='auth_fail'){        pushMsg({name:'server',message:'wrong password — '+data.attemptsLeft+' attempt'+(data.attemptsLeft===1?'':'s')+' remaining'});
  } else if(data.type==='suggest_register'){ pushMsg({name:'server',message:'tip: use /register <password> to protect your username'});
  } else if(data.type==='register'){ if(!isHost) return; const sn=clientConnNames.get(fromConn); if(!sn) return; roomPasswords[sn]=data.hash; savePasswords(roomIdStr); fromConn.send({type:'register_ack'});
  } else if(data.type==='register_ack'){     pushMsg({name:'server',message:'password registered'});

  } else if(data.type==='user_leave'){
    if(isHost){ const sn=clientConnNames.get(fromConn); if(sn!==data.name) return; }
    if(users[data.name]) users[data.name].online=false;
    pushMsg({name:'server',message:data.name+' left'});
    if(isHost) broadcastToClients(data,fromConn);

  } else if(data.type==='kick'){
    if(isHost) return;
    const reason=data.banType==='ban'      ?'You were permanently banned from this room.'  :
                 data.banType==='remove'   ?'You were removed from this room this session.' :
                 data.banType==='version'  ?'Version mismatch: room is v'+data.ourVersion+', you are v'+data.theirVersion+'.' :
                 data.banType==='nameclash'?'Username already taken in this room.'          :
                 data.banType==='authfail' ?'Too many failed login attempts.'               :
                                            'You were kicked from this room.';
    pushMsg({name:'server',message:reason}); setTimeout(()=>resetToSetup(),1500);

  } else if(data.type==='room_end'){    if(isHost) return; pushMsg({name:'server',message:'Host ended the room.'}); setTimeout(()=>resetToSetup(),1500);
  } else if(data.type==='role_update'){ if(isHost) return; if(users[data.name]) users[data.name].role=data.role;

  } else if(data.type==='mod_action'){
    if(!isHost) return;
    const actorName=clientConnNames.get(fromConn); if(!actorName||actorName!==data.actor) return;
    const ar=userRank(actorName), tr=userRank(data.target); if(ar<=tr) return;
    const act=data.action;
    if(act==='kick'&&ar>=2) doKick(data.target); else if(act==='remove'&&ar>=2) doRemove(data.target);
    else if(act==='mute'&&ar>=2) doMute(data.target); else if(act==='unmute'&&ar>=2) doUnmute(data.target);
    else if(act==='ban'&&ar>=3) doBan(data.target); else if(act==='pardon'&&ar>=3) doPardon(data.target);
    else if(act==='grant'){ const needed=(data.roleArg==='op'||data.roleArg==='tempop')?4:3; if(ar>=needed) doGrantRole(data.target,data.roleArg); }
    else if(act==='revoke'){ const needed=(tr>=3)?4:3; if(ar>=needed) doRevokeRole(data.target); }

  } else if(data.type==='init'){
    if(isHost) return;
    if(data.version!==undefined&&data.version!==VERSION) pushMsg({name:'server',message:'warning: room is v'+data.version+', you are v'+VERSION});
    history.length=0; data.history.forEach(m=>pushMsg(m));
    Object.assign(users,data.users); Object.keys(data.users).forEach(n=>invalidateAvatarCache(n));
    if(data.hostName) hostUsername=data.hostName;

  } else if(data.type==='become_host'){
    if(isHost) return;
    const origId=data.roomId;
    history.length=0; data.history.forEach(m=>pushMsg(m)); Object.assign(users,data.users);
    persistentOps=new Set(data.persistentOps||[]); persistentMods=new Set(data.persistentMods||[]);
    sessionOps=new Set(data.sessionOps||[]); sessionMods=new Set(data.sessionMods||[]);
    roomPasswords=data.passwords||{};
    if(hostConn){try{hostConn.close();}catch(e){} hostConn=null;}
    clientConns=[]; clientConnNames=new Map(); if(peer){peer.destroy();peer=null;}
    function _claimHost(id){ peer=new Peer(id,{debug:0}); peer.on('open',rid=>{ isHost=true; hostUsername=username; roomIdStr=rid; setupHostListeners(); roomBarStr=rid+'  |  host  |  '+username; pushMsg({name:'server',message:'You are now the host.'+(rid!==origId?' (new ID: '+rid+')':'')}); }); peer.on('error',e=>{ if(e.type==='unavailable-id'&&id===origId) setTimeout(()=>_claimHost(undefined),400); }); }
    setTimeout(()=>_claimHost(origId),350);

  } else if(data.type==='new_host'){
    if(isHost) return;
    hostUsername=data.name; pushMsg({name:'server',message:data.name+' is now the host.'});
    if(hostConn){try{hostConn.close();}catch(e){} hostConn=null;} roomIdStr=data.peerId;
    setTimeout(()=>{ const nc=peer.connect(data.peerId,{reliable:true}); hostConn=nc; nc.on('open',()=>{ nc.send({type:'user_info',name:username,color:users[username].color,avatar:fAvatar,role:userRole(username),version:VERSION}); roomBarStr=data.peerId+'  |  connected  |  '+username; }); nc.on('data',d=>handleIncoming(d,null)); nc.on('close',()=>{ if(appState==='chat') pushMsg({name:'server',message:'disconnected from host.'}); }); nc.on('error',e=>console.warn('reconnect err',e)); },1400);

  } else if(data.type==='whisper'){
    if(isHost&&data.to!==username){ const sn=clientConnNames.get(fromConn); if(sn) data.from=sn; const c=connForName(data.to); if(c&&c.open) c.send(data); }
    else pushMsg({type:'whisper',from:data.from,to:data.to,message:data.message});

  } else if(data.type==='delete_msg'){
    if(isHost){ const sn=clientConnNames.get(fromConn); if(!sn) return; if(data.name!==sn&&userRank(sn)<2) return; if(data.name!==sn&&userRank(sn)<=userRank(data.name)) return; }
    for(let i=history.length-1;i>=0;i--){ const m=history[i]; if(m.name===data.name&&m.message===data.message&&m.type===undefined){ history.splice(i,1); break; } }
    if(isHost) broadcastToClients(data,fromConn);

  } else if(data.type==='edit_msg'){
    if(isHost){ const sn=clientConnNames.get(fromConn); if(!sn) return; if(data.name!==sn&&userRank(sn)<3) return; if(data.name!==sn&&userRank(sn)<=userRank(data.name)) return; }
    for(let i=history.length-1;i>=0;i--){ const m=history[i]; if(m.name===data.name&&m.message===data.oldMsg&&m.type===undefined){ m.message=data.newMsg; break; } }
    if(isHost) broadcastToClients(data,fromConn);

  } else if(data.type==='mute_update'){ if(isHost) return; if(users[data.name]) users[data.name].muted=data.muted;
  } else if(data.type==='muted'){       if(isHost) return; pushMsg({name:'server',message:data.muted?'You have been muted.':'You have been unmuted.'});
  } else if(data.type==='clear_chat'){  if(isHost) return; history.length=0; pushMsg({name:'server',message:'Chat was cleared by the host.'});
  }
}

// ================================================================
//  HOST LISTENERS
// ================================================================
function setupHostListeners(){
  peer.on('connection',conn=>{
    if(!isHost){conn.close();return;}
    conn.on('open',()=>{ clientConns.push(conn); });
    conn.on('data',  d=>handleIncoming(d,conn));
    conn.on('close',()=>{
      if(!isHost) return;
      clientConns=clientConns.filter(c=>c!==conn); pendingAuthConns.delete(conn);
      const name=clientConnNames.get(conn); clientConnNames.delete(conn);
      if(name&&users[name]&&users[name].online){ users[name].online=false; const lm=name+' left'; pushMsg({name:'server',message:lm}); broadcastToClients({type:'user_leave',name},null); }
    });
    conn.on('error',e=>console.warn('[host]',e));
  });
}

// ================================================================
//  KICK / REMOVE / BAN / PARDON / MUTE
// ================================================================
function _dispatchKick(name,banType){ const conn=connForName(name); if(conn&&conn.open){conn.send({type:'kick',banType});setTimeout(()=>conn.close(),200);} if(users[name]) users[name].online=false; const lbl=banType==='ban'?'banned':banType==='remove'?'removed':'kicked'; const km=name+' was '+lbl; pushMsg({name:'server',message:km}); broadcastToClients({type:'message',name:'server',message:km},conn); broadcastToClients({type:'user_leave',name},conn); }
function doKick(n)   { _dispatchKick(n,'kick'); }
function doRemove(n) { removedNames.add(n); _dispatchKick(n,'remove'); }
function doBan(n)    { _silentClearRole(n); permanentBans.add(n); removedNames.add(n); savePermanentBans(); _dispatchKick(n,'ban'); }
function doPardon(n) { removedNames.delete(n); permanentBans.delete(n); savePermanentBans(); const pm=n+' was pardoned'; pushMsg({name:'server',message:pm}); broadcastToClients({type:'message',name:'server',message:pm},null); }
function doMute(n)   { mutedNames.add(n); if(users[n]) users[n].muted=true; const mm=n+' was muted'; pushMsg({name:'server',message:mm}); broadcastToClients({type:'mute_update',name:n,muted:true},null); broadcastToClients({type:'message',name:'server',message:mm},null); const c=connForName(n); if(c&&c.open) c.send({type:'muted',muted:true}); }
function doUnmute(n) { mutedNames.delete(n); if(users[n]) users[n].muted=false; const mm=n+' was unmuted'; pushMsg({name:'server',message:mm}); broadcastToClients({type:'mute_update',name:n,muted:false},null); broadcastToClients({type:'message',name:'server',message:mm},null); const c=connForName(n); if(c&&c.open) c.send({type:'muted',muted:false}); }

// ================================================================
//  PENDING CONFIRM / TRANSFER / CLEAR
// ================================================================
let pendingConfirm=null;
function confirmOrExecute(cmd,name,fn){ if(pendingConfirm?.cmd===cmd&&pendingConfirm?.name===name){ pendingConfirm=null; fn(); } else { pendingConfirm={cmd,name}; pushMsg({name:'server',message:'type /'+cmd+' '+name+' again to confirm'}); } }
function doTransferHost(name){
  const conn=connForName(name); pendingConfirm=null; if(!conn||!conn.open) return;
  const origId=roomIdStr;
  conn.send({type:'become_host',history:JSON.parse(JSON.stringify(history)),users:JSON.parse(JSON.stringify(users)),roomId:origId,persistentOps:[...persistentOps],persistentMods:[...persistentMods],sessionOps:[...sessionOps],sessionMods:[...sessionMods],passwords:JSON.parse(JSON.stringify(roomPasswords))});
  broadcastToClients({type:'new_host',peerId:origId,name},conn);
  pushMsg({name:'server',message:'Host transferred to '+name});
  isHost=false; hostUsername=name; clientConns=[]; clientConnNames=new Map();
  if(peer){peer.destroy();peer=null;}
  setTimeout(()=>{ peer=new Peer(undefined,{debug:0}); peer.on('open',()=>{ const nc=peer.connect(origId,{reliable:true}); hostConn=nc; roomIdStr=origId; nc.on('open',()=>{ nc.send({type:'user_info',name:username,color:users[username].color,avatar:fAvatar,version:VERSION}); roomBarStr=origId+'  |  connected  |  '+username; }); nc.on('data',d=>handleIncoming(d,null)); nc.on('close',()=>{ if(appState==='chat') pushMsg({name:'server',message:'disconnected from host.'}); }); nc.on('error',e=>console.warn('xfer reconnect',e)); }); },1200);
}
function doClearChat(){ history.length=0; scrollOffset=0; pushMsg({name:'server',message:'Chat cleared.'}); broadcastToClients({type:'clear_chat'},null); }
function doDeleteLast(name){ for(let i=history.length-1;i>=0;i--){ const m=history[i]; if(m.name===name&&m.type===undefined){ const msg=m.message; history.splice(i,1); const pkt={type:'delete_msg',name,message:msg}; if(isHost) broadcastToClients(pkt,null); else if(hostConn&&hostConn.open) hostConn.send(pkt); return true; } } return false; }
function doEditLast(name,newText){ for(let i=history.length-1;i>=0;i--){ const m=history[i]; if(m.name===name&&m.type===undefined){ const oldMsg=m.message; m.message=newText; const pkt={type:'edit_msg',name,oldMsg,newMsg:newText}; if(isHost) broadcastToClients(pkt,null); else if(hostConn&&hostConn.open) hostConn.send(pkt); return true; } } return false; }

// ================================================================
//  HISTORY / SCROLL
// ================================================================
const HISTORY_LIMIT=200;
function pushMsg(msg){ if(!msg.ts) msg.ts=Date.now(); const atBottom=scrollOffset===0; history.push(msg); if(history.length>HISTORY_LIMIT) history.splice(0,history.length-HISTORY_LIMIT);     if(!atBottom){ scrollOffset+=PADY(); clampScroll(); } }

let scrollOffset=0, linkRegions=[];
function chatAreaH(){ return MAXY-TBOXY-PADY(); }
function getMaxScroll(){ return max(0,history.length*PADY()-chatAreaH()); }
function clampScroll(){ scrollOffset=constrain(scrollOffset,0,getMaxScroll()); }

let pingPeer=null, roomStatuses={}, pingTimers={};

function startPinging(ids){ stopPinging(); roomStatuses={}; if(!ids||!ids.length) return; ids.forEach(id=>roomStatuses[id]='checking'); pingPeer=new Peer(undefined,{debug:0}); pingPeer.on('open',()=>{ ids.forEach(id=>{ try{ const c=pingPeer.connect(id,{reliable:false}); pingTimers[id]=setTimeout(()=>{ if(roomStatuses[id]==='checking') roomStatuses[id]='offline'; },4000); c.on('open',()=>{ clearTimeout(pingTimers[id]); roomStatuses[id]='online'; try{c.close();}catch(e){} }); c.on('error',()=>{ clearTimeout(pingTimers[id]); roomStatuses[id]='offline'; }); }catch(e){ roomStatuses[id]='offline'; } }); }); pingPeer.on('error',()=>{ ids.forEach(id=>{ if(roomStatuses[id]==='checking') roomStatuses[id]='offline'; }); }); }

const URL_RE=/https?:\/\/\S+/g;

function splitUrls(str){ const segs=[]; let last=0; for(const m of str.matchAll(URL_RE)){ if(m.index>last) segs.push({text:str.slice(last,m.index),isUrl:false}); segs.push({text:m[0],isUrl:true}); last=m.index+m[0].length; } if(last<str.length) segs.push({text:str.slice(last),isUrl:false}); return segs.length?segs:[{text:str,isUrl:false}]; }

function drawSegments(segs,x,by,msgCol){
  textSize(fontSize); textAlign(LEFT,BASELINE);
  for(const s of segs){
    const w=textWidth(s.text);
    if(s.isUrl){ fill(color(90,160,230)); text(s.text,x,by); stroke(color(90,160,230)); strokeWeight(0.5); line(x,by+1,x+w,by+1); noStroke();     linkRegions.push({url:s.text,x,y:by-PADY()+3,w,h:PADY()}); }
    else        { fill(msgCol); text(s.text,x,by); }
    x+=w;
  }
  return x;
}

function renderText(txt,y){
  let x=MARGX, name, message;
  if(typeof txt==='string'){ message=txt; }
  else if(txt.type==='whisper'){
    noStroke(); textSize(fontSize); textAlign(LEFT,BASELINE);
    if(txt.ts){ const d=new Date(txt.ts),hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0'); fill(72); text('['+hh+':'+mm+'] ',x,y-MARGY); x+=textWidth('['+hh+':'+mm+'] '); }
    const wCol=color(160,120,200); fill(wCol); text('['+txt.from+'>'+txt.to+']: ',x,y-MARGY); x+=textWidth('['+txt.from+'>'+txt.to+']: ');
    drawSegments(splitUrls(txt.message),x,y-MARGY,wCol); return;
  } else if(txt.type==='_hr'){
    stroke(62); strokeWeight(1); line(MARGX,y-MARGY-6,SB_X-2,y-MARGY-6); return;
  } else if(txt.type==='_help'){
    const rc={1:color(120,120,120),2:color(210,165,55),3:color(100,150,210),4:color(55,195,210)};
    noStroke(); fill(180); textSize(max(9,fontSize-1)); textAlign(LEFT,BASELINE); text(txt.cmd,MARGX,y-MARGY);
    fill(100); textSize(max(8,fontSize-2)); text(txt.desc,MARGX+floor(MAXX*0.35),y-MARGY);
    fill(rc[txt.reqRank]||color(80)); noStroke(); ellipse(SB_X-6,y-MARGY-4,5,5); return;
  } else { ({name,message}=txt); }
  noStroke(); textSize(fontSize); textAlign(LEFT,BASELINE);
  if(txt.ts){ const d=new Date(txt.ts),hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0'); fill(72); text('['+hh+':'+mm+'] ',x,y-MARGY); x+=textWidth('['+hh+':'+mm+'] '); }
  const resolvedCol=users[name]?.color||txt.color||'white';
  const resolvedAv=users[name]?.avatar||txt.avatar||null;
  if(name&&(users[name]||txt.color)){
    const pg=resolvedAv?(()=>{ const av=resolvedAv, hash=av.join('|'); if(avatarGfxCache[name]?.hash===hash) return avatarGfxCache[name].pg; const pg=createGraphics(8,8); pg.noStroke(); pg.clear(); for(let r=0;r<8;r++) for(let c=0;c<8;c++){ const col=av[r*8+c]; if(col){pg.fill(col);pg.rect(c,r,1,1);} } avatarGfxCache[name]={pg,hash}; return pg; })():null;
    if(pg){ noSmooth(); image(pg,x,y-MARGY-10,12,12); smooth(); x+=14; }
    else  { fill(resolvedCol); noStroke(); ellipse(x+4,y-MARGY-4,7,7); x+=12; }
  }
  if(users[name]||txt.color){ fill(resolvedCol); textSize(fontSize); textAlign(LEFT,BASELINE); const pre='<'+name+'>: '; text(pre,x,y-MARGY); x+=textWidth(pre); }
  drawSegments(splitUrls(message||''),x,y-MARGY,resolvedCol);
}

function drawInput(){
  const maxW=SB_X-2-MARGX;
  textFont('monospace'); textSize(fontSize);
  const charW=textWidth('M'), lineLen=Math.floor(maxW/charW);
  const blink=Math.floor(frame/30)%2===1;
  const lines=[]; let rem=working_text;
  while(rem.length>lineLen){ lines.push(rem.slice(0,lineLen)); rem=rem.slice(lineLen); }
  lines.push(rem);
  const baseY=(MAXY+1.5*PADY())-TBOXY;
  noStroke(); textAlign(LEFT,BASELINE);
  if(authPending){ noStroke(); fill(color(80,55,20,60)); rect(0,baseY-PADY(),MAXX,PADY()+4); if(!working_text){ fill(color(160,120,50)); textSize(fontSize); textAlign(LEFT,BASELINE); text('/login <password>',MARGX,baseY-MARGY); return; } }
  for(let i=0;i<lines.length;i++){
    const y=baseY-(lines.length-1-i)*PADY()-MARGY, start=i*lineLen, end=start+lines[i].length;
    fill(200); text(lines[i],MARGX,y);
    if(cursorPos>=start&&cursorPos<=end){ const cx=MARGX+textWidth(lines[i].slice(0,cursorPos-start)); if(blink){ fill(200); text('|',cx,y); } else { stroke(80); strokeWeight(1); line(cx,y,cx,y-PADY()+3); noStroke(); } }
  }
}

function draw(){
  background(50); frame++; cursor(ARROW);
  if(appState==='chat'){
    if(roomIdStr&&frame%300===0) saveRoomHistory(roomIdStr);
    if(undoDirty&&frame%300===0) undoSnapshot();
    clampScroll(); linkRegions=[];
    drawHeader(); drawFooter();
    push(); translate(0,HEADER_H);
    drawingContext.save(); drawingContext.beginPath(); drawingContext.rect(0,0,MAXX,MAXY); drawingContext.clip();
    for(let i=0;i<history.length;i++){ const y=(MAXY-(history.length-1-i)*PADY())-TBOXY+scrollOffset; if(y-MARGY>MAXY+2||y-MARGY<-PADY()) continue; renderText(history[i],y); }
    drawingContext.restore();
    for(const r of linkRegions){ if(mouseX>=r.x&&mouseX<=r.x+r.w&&mouseY-HEADER_H>=r.y&&mouseY-HEADER_H<=r.y+r.h){ cursor(HAND); break; } }
    drawInput();
    const maxS=getMaxScroll();
    if(maxS>0){ const areaH=MAXY-10, thumbH=max(20,areaH*(MAXY/(MAXY+maxS))); const thumbT=5+(1-scrollOffset/maxS)*(areaH-thumbH); noStroke(); fill(38); rect(SB_X,5,SB_W,areaH,2); fill(scrollOffset>0?95:55); rect(SB_X,thumbT,SB_W,thumbH,2); }
    if(scrollOffset>0){ const bW=58,bH=16,bX=MAXX/2-bW/2,bY=MAXY-TBOXY-bH-6; const hov=mouseX>=bX&&mouseX<=bX+bW&&mouseY-HEADER_H>=bY&&mouseY-HEADER_H<=bY+bH; if(hov) cursor(HAND); strokeWeight(1); stroke(hov?100:65); fill(hov?color(55,58,68):color(35,38,45)); rect(bX,bY,bW,bH,3); noStroke(); fill(hov?190:120); textSize(10); textAlign(CENTER,CENTER); text('↓  latest',bX+bW/2,bY+bH/2); }
    pop();
  }
  if(appState==='setup') drawSetup();
}

function send(msg,name){ if(!msg||!msg.trim()) return; const col=users[name]?.color||null, avatar=users[name]?.avatar||null; pushMsg({name,message:msg.trim(),color:col,avatar}); const p={type:'message',name,message:msg.trim(),color:col,avatar}; if(isHost) broadcastToClients(p,null); else if(hostConn&&hostConn.open) hostConn.send(p); }
function resolveOnlineUser(name){ if(!name) return null; const ol=getOnlineList(); return (ol.find(u=>u.name===name)||ol.find(u=>u.name.toLowerCase()===name.toLowerCase()))?.name??null; }
function doWhisper(to,message){ if(to===username){ pushMsg({name:'server',message:"you can't whisper to yourself"}); return; } pushMsg({type:'whisper',from:username,to,message}); const pkt={type:'whisper',from:username,to,message}; if(isHost){ const c=connForName(to); if(c&&c.open) c.send(pkt); } else if(hostConn&&hostConn.open) hostConn.send(pkt); }

function showHelp(rank){

  function row(cmd,desc,r){ pushMsg({type:'_help',cmd,desc,reqRank:r}); }
  hr();
  row('/h  /help',            'show this help',              1);
  row('/w  /whisper <n> <m>', 'send a private message',      1);
  row('/q  /exit',            'leave or end room',           1);
  row('/e  /edit <new text>', 'edit your last message',      1);
  row('/d  /delete',          'delete your last message',    1);
  row('/register <password>', 'protect your username',       1);
  row('/bk  /backup',         'download chat backup',        1);
  hr();
  if(rank>=2){ row('/d <n>','delete last msg of user',2); row('/mu  /mute <n>','mute a user',2); row('/um  /unmute <n>','unmute a user',2); row('/k  /kick <n>','kick (can rejoin)',2); row('/r  /rem  /remove <n>','remove for this session',2); hr(); }
  if(rank>=3){ row('/e <n> <txt>','edit last msg of user',3); row('/b  /ban <n>','permanent ban',3); row('/p  /pdn  /pardon <n>','pardon a banned user',3); row('/tm  /tempmod <n>','temp mod (this session)',3); row('/m  /mod <n>','permanent mod',3); row('/dm  /demod <n>','remove mod role',3); hr(); }
  if(rank>=4){ row('/to  /tempop <n>','temp op (this session)',4); row('/o  /op <n>','permanent op',4); row('/do  /deop <n>','remove op role',4); row('/owner <n>','transfer ownership',4); row('/c  /clr  /clear','clear chat history',4); row('/rs  /restore','restore chat from file',4); row('/end','end room for everyone',4); hr(); }
}

function handleCommand(text){
  if(!text||!text.trim()) return;
  if(authPending){ const parts=text.trim().slice(1).split(/\s+/); if(!text.startsWith('/')||parts[0]?.toLowerCase()!=='login'){ pushMsg({name:'server',message:'you must /login <password> first'}); return; } const pw=parts.slice(1).join(' '); if(!pw){ pushMsg({name:'server',message:'usage: /login <password>'}); return; } hashPassword(pw).then(hash=>{ if(hostConn&&hostConn.open) hostConn.send({type:'auth_attempt',hash}); }); return; }
  if(!text.startsWith('/')){ send(text,username); return; }
  const parts=text.trim().slice(1).split(/\s+/);
  const cmd=parts[0].toLowerCase(), arg1=parts[1]||'', rest=parts.slice(2).join(' ');
  const rank=myRank();
  function needRank(r,lbl){ if(rank<r){ pushMsg({name:'server',message:'requires '+lbl}); return false; } return true; }
  function resolveTarget(arg){ const t=resolveOnlineUser(arg); if(!t){ pushMsg({name:'server',message:'user not found: '+arg}); return null; } return t; }
  function rankCheck(t,ar){ if(userRank(t)>=ar){ pushMsg({name:'server',message:'cannot target '+t+': outranks you'}); return false; } return true; }

  if(cmd==='login'){ pushMsg({name:'server',message:'already authenticated'});
  } else if(cmd==='register'){ const pw=parts.slice(1).join(' '); if(!pw){ pushMsg({name:'server',message:'usage: /register <password>'}); return; } hashPassword(pw).then(hash=>{ if(isHost){ roomPasswords[username]=hash; savePasswords(roomIdStr); pushMsg({name:'server',message:'password registered'}); } else if(hostConn&&hostConn.open) hostConn.send({type:'register',hash}); });
  } else if(cmd==='mu'||cmd==='mute'){ if(!needRank(2,'moderator'))return; const t=resolveTarget(arg1);if(!t)return; if(!rankCheck(t,rank))return; sendOrExecModAction('mute',t);
  } else if(cmd==='um'||cmd==='unmute'){ if(!needRank(2,'moderator'))return; const t=resolveTarget(arg1);if(!t)return; sendOrExecModAction('unmute',t);
  } else if(cmd==='k'||cmd==='kick'){ if(!needRank(2,'moderator'))return; const t=resolveTarget(arg1);if(!t)return; if(!rankCheck(t,rank))return; sendOrExecModAction('kick',t);
  } else if(cmd==='r'||cmd==='rem'||cmd==='remove'){ if(!needRank(2,'moderator'))return; const t=resolveTarget(arg1);if(!t)return; if(!rankCheck(t,rank))return; sendOrExecModAction('remove',t);
  } else if(cmd==='b'||cmd==='ban'){ if(!needRank(3,'operator'))return; const t=resolveTarget(arg1);if(!t)return; if(!rankCheck(t,rank))return; sendOrExecModAction('ban',t);
  } else if(cmd==='p'||cmd==='pdn'||cmd==='pardon'){ if(!needRank(3,'operator'))return; if(!arg1){pushMsg({name:'server',message:'usage: /pardon <n>'});return;} sendOrExecModAction('pardon',arg1);
  } else if(cmd==='tm'||cmd==='tempmod'){ if(!needRank(3,'operator'))return; const t=resolveTarget(arg1);if(!t)return; if(!rankCheck(t,rank))return; confirmOrExecute(cmd,t,()=>sendOrExecModAction('grant',t,'tempmod'));
  } else if(cmd==='m'||cmd==='mod'){ if(!needRank(3,'operator'))return; const t=resolveTarget(arg1);if(!t)return; if(!rankCheck(t,rank))return; confirmOrExecute(cmd,t,()=>sendOrExecModAction('grant',t,'mod'));
  } else if(cmd==='dm'||cmd==='demod'){ if(!needRank(3,'operator'))return; const t=resolveTarget(arg1);if(!t)return; if(userRank(t)!==2){pushMsg({name:'server',message:arg1+' is not a moderator'});return;} confirmOrExecute(cmd,t,()=>sendOrExecModAction('revoke',t,'mod'));
  } else if(cmd==='to'||cmd==='tempop'){ if(!needRank(4,'owner'))return; const t=resolveTarget(arg1);if(!t)return; if(!rankCheck(t,rank))return; confirmOrExecute(cmd,t,()=>sendOrExecModAction('grant',t,'tempop'));
  } else if(cmd==='o'||cmd==='op'){ if(!needRank(4,'owner'))return; const t=resolveTarget(arg1);if(!t)return; if(!rankCheck(t,rank))return; confirmOrExecute(cmd,t,()=>sendOrExecModAction('grant',t,'op'));
  } else if(cmd==='do'||cmd==='deop'){ if(!needRank(4,'owner'))return; const t=resolveTarget(arg1);if(!t)return; if(userRank(t)!==3){pushMsg({name:'server',message:arg1+' is not an operator'});return;} confirmOrExecute(cmd,t,()=>sendOrExecModAction('revoke',t,'op'));
  } else if(cmd==='owner'){ if(!needRank(4,'owner'))return; const t=resolveTarget(arg1);if(!t)return; confirmOrExecute(cmd,t,()=>doTransferHost(t));
  } else if(cmd==='w'||cmd==='whisper'){ const t=resolveTarget(arg1);if(!t)return; if(!rest){pushMsg({name:'server',message:'usage: /w <n> <message>'});return;} doWhisper(t,rest);
  } else if(cmd==='q'||cmd==='quit'||cmd==='exit'){ rank>=4?doEndRoom():doLeave();
  } else if(cmd==='end'){ if(!needRank(4,'owner'))return; doEndRoom();
  } else if(cmd==='e'||cmd==='edit'){
    const maybeTarget=resolveOnlineUser(arg1);
    if(maybeTarget&&maybeTarget!==username&&parts.length>2){ if(!needRank(3,'operator'))return; if(!rankCheck(maybeTarget,rank))return; if(!doEditLast(maybeTarget,parts.slice(2).join(' '))) pushMsg({name:'server',message:'no messages found for '+maybeTarget}); }
    else{ const newText=parts.slice(1).join(' '); if(!newText){pushMsg({name:'server',message:'usage: /e <new text>'});return;} if(!doEditLast(username,newText)) pushMsg({name:'server',message:'nothing to edit'}); }
  } else if(cmd==='d'||cmd==='delete'){
    if(arg1){ if(!needRank(2,'moderator'))return; const t=resolveTarget(arg1);if(!t)return; if(!rankCheck(t,rank))return; if(!doDeleteLast(t)) pushMsg({name:'server',message:'no messages found for '+t}); }
    else    { if(!doDeleteLast(username)) pushMsg({name:'server',message:'nothing to delete'}); }
  } else if(cmd==='c'||cmd==='clr'||cmd==='clear'){ if(!needRank(4,'owner'))return; doClearChat();
  } else if(cmd==='bk'||cmd==='backup'){ const blob=new Blob([JSON.stringify({history,users},null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); Object.assign(document.createElement('a'),{href:url,download:'chat-backup-'+Date.now()+'.json'}).click(); URL.revokeObjectURL(url);
  } else if(cmd==='rs'||cmd==='restore'){ if(!needRank(4,'owner'))return; document.getElementById('ri').click();
  } else if(cmd==='h'||cmd==='help'){ showHelp(rank);
  } else { pushMsg({name:'server',message:'unknown command: /'+cmd}); }
}

function mousePressed(){ if(appState==='setup') handleSetupClick(); else handleChatClick(); }
function doubleClicked(){

  const fx=MAXX/2-SFW/2; let cy=SY_CONT;
  if(setupMode==='create'){ cy+=SFH+10+CBH+12; const l=roomListLayout('create',cy); if(l) for(const {room,y} of l.rows) if(isHov(fx,y,SFW-18,20)){ fRname=room.rname!==room.id?room.rname:room.id; doCreateRoom(); return; } }
  if(setupMode==='join')  { cy+=SFH+10+CBH+12; const l=roomListLayout('join',cy);   if(l) for(const {room,y} of l.rows) if(isHov(fx,y,SFW-18,20)){ fJroom=room.id; doJoinRoom(); return; } }
}
function handleSetupClick(){
  const cx=MAXX/2, fx=cx-SFW/2;
  const mb1x=cx-117, mb2x=cx-37, mb3x=cx+43;
  if(isHov(mb1x,SY_MBTNS,MBW,MBH)){ if(setupMode!=='create'){setupMode='create';focusField='rname';setStatus('');startPingingForMode('create');} return; }
  if(isHov(mb2x,SY_MBTNS,MBW,MBH)){ if(setupMode!=='join')  {setupMode='join';  focusField='jroom';setStatus('');startPingingForMode('join');  } return; }
  if(isHov(mb3x,SY_MBTNS,MBW,MBH)){ if(setupMode!=='profile'){setupMode='profile';focusField='uname';stopPinging();setStatus('');} return; }
  let cy=SY_CONT;
  if(setupMode==='create'){ if(isHov(fx,cy,SFW,SFH)){focusField='rname';return;} cy+=SFH+10; if(isHov(cx-CBW/2,cy,CBW,CBH)){doCreateRoom();return;} cy+=CBH+12; const l=roomListLayout('create',cy); if(l) for(const {room,y} of l.rows){ if(isHov(fx+SFW-18,y+3,14,14)){deleteCreatedRoom(room.id);delete roomStatuses[room.id];return;} if(isHov(fx,y,SFW-18,20)){fRname=room.rname!==room.id?room.rname:room.id;focusField='rname';return;} } }
  if(setupMode==='join'){   if(isHov(fx,cy,SFW,SFH)){focusField='jroom';return;} cy+=SFH+10; if(isHov(cx-CBW/2,cy,CBW,CBH)){doJoinRoom();return;} cy+=CBH+12; const l=roomListLayout('join',cy);   if(l) for(const {room,y} of l.rows){ if(isHov(fx+SFW-18,y+3,14,14)){deleteJoinedRoom(room.id);delete roomStatuses[room.id];return;} if(isHov(fx,y,SFW-18,20)){fJroom=room.id;focusField='jroom';return;} } }
  if(setupMode==='profile'){
    if(isHov(fx,cy,SFW,SFH)){focusField='uname';return;} cy+=SFH+16;
    const cfw=SFW-SFH-8; if(isHov(fx,cy,cfw,SFH)){focusField='color';return;} cy+=SFH+10;
    const {gx,gy}=avGridPos(); const ppx=gx+8*AV_CS+5;
    for(let i=0;i<AV_PALETTE.length;i++){ const pr=floor(i/2),pc=i%2,bx=ppx+pc*(AV_PCW+2),by=gy+pr*(AV_PCH+2); if(isHov(bx,by,AV_PCW,AV_PCH)){avPalIdx=i;return;} }
    if(isHov(gx,gy,8*AV_CS,8*AV_CS)){ if(!fAvatar) initAvatarDefault(); paintAvatarCell(mouseX,mouseY,gx,gy); return; }
    const btnY=gy+8*AV_CS+6;
    if(isHov(gx,btnY,53,18)){fAvatar=new Array(64).fill(getAvPaintColor());saveProfile();return;}
    if(isHov(gx+57,btnY,53,18)){fAvatar=new Array(64).fill('');saveProfile();return;}
  }
}
function handleChatClick(){
  const cmy=mouseY-HEADER_H;
  for(const r of linkRegions){ if(mouseX>=r.x&&mouseX<=r.x+r.w&&cmy>=r.y&&cmy<=r.y+r.h){ window.open(r.url,'_blank','noopener,noreferrer'); return; } }

  // Header font-size buttons
  const {hy,bw,numW,gap,x_plus,x_num,x_minus,x_copy}=fontBtnLayout();
  if(isHov(x_plus, hy,bw,16)){ fontSize=min(FONT_MAX,fontSize+1); return; }
  if(isHov(x_minus,hy,bw,16)){ fontSize=max(FONT_MIN,fontSize-1); return; }
  if(isHost&&roomIdStr&&isHov(x_copy,hy,52,16)){ navigator.clipboard.writeText(roomIdStr).then(()=>{copyLabel='Copied!';setTimeout(()=>{copyLabel='copy ID';},2000);}); return; }

  const fy=MAXY+HEADER_H, by=fy+(FOOTER_H-FB_H)/2;
  for(const b of footerBtns()){
    if(!isHov(b.x,by,b.w,FB_H)) continue;
    if(b.id==='bk'){ const blob=new Blob([JSON.stringify({history,users},null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); Object.assign(document.createElement('a'),{href:url,download:'chat-backup-'+Date.now()+'.json'}).click(); URL.revokeObjectURL(url); }
    else if(b.id==='rs') document.getElementById('ri').click();
    else if(b.id==='clr') doClearChat();
    else if(b.id==='end') doEndRoom();
    else if(b.id==='leave') doLeave();
    return;
  }
  if(scrollOffset>0){ const bW=58,bH=16,bX=MAXX/2-bW/2,bY=MAXY-TBOXY-bH-6; if(mouseX>=bX&&mouseX<=bX+bW&&cmy>=bY&&cmy<=bY+bH){ scrollOffset=0; return; } }
  const obW=76, obx=MAXX-MARGX-obW;
  if(isHov(obx,by,obW,FB_H)){onlinePanelOpen=!onlinePanelOpen;pendingConfirm=null;return;}
  if(onlinePanelOpen){
    const ol=getOnlineList(), g=onlinePanelGeom(ol,fy);
    if(isHov(g.panelX,g.panelY,g.panelW,g.panelH)){
      if(isHost){
        const bH=14,bBX=g.panelX+g.panelW-4-14,bRX=bBX-2-14,bKX=bRX-2-14,bHX=bKX-2-14,bOX=bHX-2-14,bMX=bOX-2-14,bMUX=bMX-2-14;
        for(let i=0;i<ol.length;i++){
          const u=ol[i]; if(u.name===username) continue;
          const ry=g.panelY+g.padY+i*g.rowH;
          if(isHov(bMUX,ry+3,14,bH)){ mutedNames.has(u.name)?doUnmute(u.name):doMute(u.name); pendingConfirm=null; return; }
          if(isHov(bMX,ry+3,14,bH)){ if(pendingConfirm?.cmd==='mod'&&pendingConfirm?.name===u.name){ pendingConfirm=null; userRank(u.name)===2?sendOrExecModAction('revoke',u.name):sendOrExecModAction('grant',u.name,'mod'); } else pendingConfirm={cmd:'mod',name:u.name}; return; }
          if(isHov(bOX,ry+3,14,bH)){ if(pendingConfirm?.cmd==='op'&&pendingConfirm?.name===u.name){ pendingConfirm=null; userRank(u.name)===3?sendOrExecModAction('revoke',u.name):sendOrExecModAction('grant',u.name,'op'); } else pendingConfirm={cmd:'op',name:u.name}; return; }
          if(isHov(bHX,ry+3,14,bH)){ if(pendingConfirm?.cmd==='owner'&&pendingConfirm?.name===u.name){pendingConfirm=null;doTransferHost(u.name);}else pendingConfirm={cmd:'owner',name:u.name}; return; }
          if(isHov(bKX,ry+3,14,bH)){doKick(u.name);   pendingConfirm=null;return;}
          if(isHov(bRX,ry+3,14,bH)){doRemove(u.name); pendingConfirm=null;return;}
          if(isHov(bBX,ry+3,14,bH)){doBan(u.name);    pendingConfirm=null;return;}
        }
        if(g.hasBlocked){ const pdnW=22,pdnX=g.panelX+g.panelW-4-pdnW; for(let i=0;i<g.bl.length;i++){ const ry=g.blockedBaseY+i*g.rowH; if(isHov(pdnX,ry+3,pdnW,14)){doPardon(g.bl[i].name);return;} } }
      }
      return;
    }
    onlinePanelOpen=false; pendingConfirm=null;
  }
}

// ================================================================
//  SETUP KEY HANDLER
// ================================================================
function handleSetupKey(){
  if(keyIsDown(CONTROL)||keyIsDown(91)||keyIsDown(93)) return; // let native listener handle ctrl combos
  if(keyCode===TAB){ const vis=setupMode==='profile'?['uname','color']:setupMode==='create'?['rname']:setupMode==='join'?['jroom']:[];if(vis.length)focusField=vis[(vis.indexOf(focusField)+1)%vis.length];return; }
  if(keyCode===ENTER){ if(setupMode==='create')doCreateRoom();else if(setupMode==='join')doJoinRoom();return; }
  if(keyCode===BACKSPACE){ if(focusField==='uname')fUname=fUname.slice(0,-1);else if(focusField==='rname')fRname=fRname.slice(0,-1);else if(focusField==='jroom')fJroom=fJroom.slice(0,-1);else if(focusField==='color')fColor=fColor.slice(0,-1);if(setupMode==='profile')saveProfile();return; }
  if(key.length===1){ if(focusField==='uname')fUname+=key;else if(focusField==='rname')fRname+=key;else if(focusField==='jroom')fJroom+=key;else if(focusField==='color')fColor+=key;if(setupMode==='profile')saveProfile(); }
}

// ================================================================
//  NETWORK: CREATE / JOIN / LEAVE / END
// ================================================================
function doCreateRoom(){
  const uname=fUname.trim(), customId=fRname.trim().replace(/\s+/g,'-')||undefined;
  if(!uname){setStatus('set your username in Profile first',true);setupMode='profile';focusField='uname';return;}
  username=uname; setStatus('connecting...'); stopPinging();
  peer=new Peer(customId,{debug:0});
  peer.on('open',id=>{ isHost=true; roomIdStr=id; hostUsername=username; saveCreatedRoom(id,fRname.trim()||id); loadRoles(id); loadPasswords(id); const restored=loadRoomHistory(id); if(!restored){history.length=0;pushMsg({name:'server',message:'Room created.'});} if(!fAvatar) initAvatarDefault(); users[username]={color:resolvedColor(id),online:true,avatar:fAvatar,role:'owner'}; setupHostListeners(); roomBarStr=id+'  |  host  |  '+username; appState='chat'; });
  peer.on('error',e=>{ setStatus(e.type==='unavailable-id'?'"'+customId+'" is taken - try another':'error: '+e.type,true); peer.destroy(); peer=null; });
}
function doJoinRoom(){
  const uname=fUname.trim(), roomId=fJroom.trim();
  if(!uname) {setStatus('set your username in Profile first',true);setupMode='profile';focusField='uname';return;}
  if(!roomId){setStatus('enter a room id',true);return;}
  username=uname; setStatus('connecting...'); stopPinging();
  peer=new Peer(undefined,{debug:0});
  peer.on('open',myId=>{ if(!fAvatar) initAvatarDefault(); users[username]={color:resolvedColor(myId),online:true,avatar:fAvatar}; const conn=peer.connect(roomId,{reliable:true}); hostConn=conn; conn.on('open',()=>{ conn.send({type:'user_info',name:username,color:users[username].color,avatar:fAvatar,version:VERSION}); saveJoinedRoom(roomId); roomIdStr=roomId; roomBarStr=roomId+'  |  connecting  |  '+username; appState='chat'; }); conn.on('data',d=>handleIncoming(d,null)); conn.on('close',()=>{ if(appState==='chat') pushMsg({name:'server',message:'disconnected from host.'}); }); conn.on('error',e=>setStatus('connection failed: '+e.type,true)); });
  peer.on('error',e=>setStatus('error: '+e.type,true));
}
function doLeave(){ if(hostConn&&hostConn.open) hostConn.send({type:'user_leave',name:username}); if(roomIdStr) saveRoomHistory(roomIdStr); resetToSetup(); }
function doEndRoom(){ if(roomIdStr) saveRoomHistory(roomIdStr); broadcastToClients({type:'room_end'},null); resetToSetup(); }

// ================================================================
//  NATIVE KEY LISTENER
// ================================================================
document.addEventListener('keydown',e=>{
  const ctrl=e.ctrlKey||e.metaKey;

  // Font size — works everywhere
  if(ctrl&&(e.key==='='||e.key==='+'||e.key==='NumpadAdd')){
    fontSize=min(FONT_MAX,fontSize+1); e.preventDefault(); return;
  }
  if(ctrl&&(e.key==='-'||e.key==='NumpadSubtract')){
    fontSize=max(FONT_MIN,fontSize-1); e.preventDefault(); return;
  }

  // Setup field ctrl shortcuts
  if(appState==='setup'&&focusField&&ctrl){
    const val=getSetupField();
    if(e.key==='c'){ navigator.clipboard.writeText(val); e.preventDefault(); return; }
    if(e.key==='x'){ setupUndo[focusField]=val; navigator.clipboard.writeText(val); setSetupField(''); e.preventDefault(); return; }
    if(e.key==='d'){ setupUndo[focusField]=val; setSetupField(''); e.preventDefault(); return; }
    if(e.key==='v'){ navigator.clipboard.readText().then(t=>{ setupUndo[focusField]=val; setSetupField(t.trim()); }); e.preventDefault(); return; }
    if(e.key==='z'){ const prev=setupUndo[focusField]||''; setupUndo[focusField]=val; setSetupField(prev); e.preventDefault(); return; }
    if(e.key==='y'){ const redo=setupRedo[focusField]||''; setupRedo[focusField]=val; setSetupField(redo); e.preventDefault(); return; }
    return;
  }

  if(appState!=='chat') return;

  if(ctrl){
    if(e.key==='c'){navigator.clipboard.writeText(working_text);e.preventDefault();return;}
    if(e.key==='x'){undoSnapshot();navigator.clipboard.writeText(working_text);inputSet('',0);e.preventDefault();return;}
    if(e.key==='v'){undoSnapshot();navigator.clipboard.readText().then(t=>{inputInsert(t.replace(/\r?\n/g,' '));});e.preventDefault();return;}
    if(e.key==='d'){undoSnapshot();inputSet('',0);e.preventDefault();return;}
    if(e.key==='z'){e.preventDefault();if(undoStack.length){redoStack.push({text:working_text,pos:cursorPos});const s=undoStack.pop();working_text=s.text;cursorPos=s.pos;undoDirty=false;}return;}
    if(e.key==='y'){e.preventDefault();if(redoStack.length){undoStack.push({text:working_text,pos:cursorPos});const s=redoStack.pop();working_text=s.text;cursorPos=s.pos;undoDirty=false;}return;}
    return;
  }
  if(e.key==='ArrowLeft') {cursorPos=max(0,cursorPos-1);e.preventDefault();return;}
  if(e.key==='ArrowRight'){cursorPos=min(working_text.length,cursorPos+1);e.preventDefault();return;}
  if(e.key==='ArrowUp'){
    e.preventDefault(); if(!consoleHistory.length) return;
    if(consoleHistIdx===-1) consoleSaved=working_text;
    consoleHistIdx=min(consoleHistory.length-1,consoleHistIdx+1); inputSet(consoleHistory[consoleHistIdx]); return;
  }
  if(e.key==='ArrowDown'){
    e.preventDefault(); if(consoleHistIdx===-1) return;
    consoleHistIdx--; inputSet(consoleHistIdx===-1?consoleSaved:consoleHistory[consoleHistIdx]); return;
  }
  if(e.key==='Backspace'){inputBackspace();e.preventDefault();return;}
  if(e.key.length===1){inputInsert(e.key);e.preventDefault();}
});

// ================================================================
//  RESTORE FILE HANDLER
// ================================================================
document.getElementById('ri').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{ try{ const data=JSON.parse(ev.target.result); if(Array.isArray(data.history)){history.length=0;data.history.forEach(m=>pushMsg(m));} if(data.users&&typeof data.users==='object') Object.entries(data.users).forEach(([k,v])=>{ if(!users[k]) users[k]=v; }); }catch{} };
  reader.readAsText(file); e.target.value='';
});
